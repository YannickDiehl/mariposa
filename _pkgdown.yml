url: https://YannickDiehl.github.io/mariposa/

template:
  bootstrap: 5
  bootswatch: flatly
  theme: arrow-light

home:
  title: mariposa - Professional Survey Analysis in R
  description: >
    A comprehensive R package for statistical analysis of survey data.
    Full support for survey weights, tidyverse integration, and
    professional output formatting. Validated against SPSS for
    reproducible, publication-ready results.

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github]
  components:
    reference:
      text: Reference
      href: reference/index.html
    articles:
      text: Guides
      menu:
      - text: "Getting Started"
      - text: "Introduction to mariposa"
        href: articles/introduction.html
      - text: "-------"
      - text: "Data Management"
      - text: "Importing & Exporting Data"
        href: articles/data-io.html
      - text: "Labels & Missing Values"
        href: articles/labels-and-missing-values.html
      - text: "Data Transformation"
        href: articles/data-transformation.html
      - text: "-------"
      - text: "Core Analysis"
      - text: "Descriptive Statistics"
        href: articles/descriptive-statistics.html
      - text: "Hypothesis Testing"
        href: articles/hypothesis-testing.html
      - text: "Correlation Analysis"
        href: articles/correlation-analysis.html
      - text: "-------"
      - text: "Advanced Topics"
      - text: "Scale Analysis"
        href: articles/scale-analysis.html
      - text: "Regression Analysis"
        href: articles/regression-analysis.html
      - text: "Working with Survey Weights"
        href: articles/survey-weights.html
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/YannickDiehl/mariposa
      aria-label: GitHub

reference:
- title: "Data Import"
  desc: "Import statistical data files with preserved missing value information"
  contents:
  - read_spss
  - read_por
  - read_stata
  - read_sas
  - read_xpt
  - read_xlsx

- title: "Data Export"
  desc: "Export data to statistical formats with preserved labels and missing values"
  contents:
  - write_spss
  - write_stata
  - write_xpt
  - write_xlsx

- title: "Label Management"
  desc: "Inspect, modify, and convert labelled survey data"
  contents:
  - var_label
  - val_labels
  - copy_labels
  - drop_labels
  - to_label
  - to_character
  - to_numeric
  - to_labelled
  - set_na
  - unlabel

- title: "Data Transformation"
  desc: "Recode, dichotomize, dummy-code, standardize, and center variables"
  contents:
  - rec
  - to_dummy
  - std
  - center

- title: "Data Exploration"
  desc: "Search and inspect your data"
  contents:
  - find_var

- title: "Descriptive Statistics"
  desc: "Summarize and explore your survey data"
  contents:
  - codebook
  - describe
  - frequency
  - crosstab

- title: "Hypothesis Testing"
  desc: "Compare groups and test for significant differences"
  contents:
  - t_test
  - oneway_anova
  - factorial_anova
  - ancova
  - mann_whitney
  - chi_square
  - fisher_test
  - chisq_gof
  - mcnemar_test

- title: "Non-Parametric Tests"
  desc: "Distribution-free tests for ordinal and nominal data"
  contents:
  - kruskal_wallis
  - wilcoxon_test
  - friedman_test
  - binomial_test

- title: "Correlation Analysis"
  desc: "Measure relationships between variables"
  contents:
  - pearson_cor
  - spearman_rho
  - kendall_tau

- title: "Post-Hoc Analysis"
  desc: "Follow-up tests for detailed group comparisons"
  contents:
  - tukey_test
  - scheffe_test
  - levene_test
  - dunn_test
  - pairwise_wilcoxon

- title: "Scale Analysis"
  desc: "Factor analysis, reliability, and scale construction"
  contents:
  - reliability
  - efa
  - pomps
  - row_means
  - row_sums
  - row_count

- title: "Regression Analysis"
  desc: "Linear and logistic regression with SPSS-compatible output"
  contents:
  - linear_regression
  - logistic_regression

- title: "Weighted Statistics"
  desc: "Individual weighted statistics for survey data"
  contents:
  - w_mean
  - w_median
  - w_sd
  - w_var
  - w_se
  - w_iqr
  - w_range
  - w_quantile
  - w_modus
  - w_skew
  - w_kurtosis

- title: "Datasets"
  desc: "Example datasets for learning and testing"
  contents:
  - survey_data
  - longitudinal_data
  - longitudinal_data_wide

- title: internal
  contents:
  - na_frequencies
  - untag_na
  - strip_tags
  - fre
  - starts_with("print.")
  - starts_with("summary.")

articles:
- title: "Getting Started"
  navbar: ~
  contents:
  - introduction

- title: "Data Management"
  navbar: ~
  contents:
  - data-io
  - labels-and-missing-values
  - data-transformation

- title: "Core Analysis"
  navbar: ~
  contents:
  - descriptive-statistics
  - hypothesis-testing
  - correlation-analysis

- title: "Advanced Topics"
  navbar: ~
  contents:
  - scale-analysis
  - regression-analysis
  - survey-weights

footer:
  structure:
    left: developed_by
    right: built_with
  components:
    developed_by: "Developed by [Yannick Diehl](https://github.com/YannickDiehl)"
    built_with: "Built with [pkgdown](https://pkgdown.r-lib.org/)"

development:
  mode: auto
