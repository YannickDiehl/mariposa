on:
  # Manual trigger from the Actions tab
  workflow_dispatch:
  # Automatic on release tags
  push:
    tags:
      - 'v*'
  # Weekly safety net, Sunday 04:00 UTC
  schedule:
    - cron: '0 4 * * 0'

name: strict-validation

permissions: read-all

# Strict validation runs the full test suite with the validation discipline
# meta-test in enforcement mode. Unlike the standard R-CMD-check workflow,
# this fails the build on any Charter §8 violation (inline tolerances,
# expect_true(TRUE) reporting blocks, NA placeholders, exception registry
# drift, etc.).
#
# This workflow is intentionally separate from R-CMD-check so that:
#   - day-to-day PR work is not blocked by mid-migration findings
#   - release tags must pass strict validation before going to CRAN
#   - the weekly scheduled run catches drift introduced by silent merges

jobs:
  strict-validation:
    runs-on: ubuntu-latest
    name: strict (ubuntu-latest, R release)

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # Tells test-validation-discipline.R to fail (not skip) on findings
      MARIPOSA_VALIDATION_STRICT: 'TRUE'

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # Strict validation needs every Suggests package installed so that
          # no test silently skips via skip_if_not_installed(). pkgload and
          # testthat are pulled in for the lightweight runner below.
          extra-packages: |
            any::rcmdcheck
            any::pkgload
            any::testthat
            any::haven
            any::openxlsx2
            any::GPArotation
            any::MASS
            any::survey
            any::PMCMRplus
          needs: check

      - name: Run full test suite in strict validation mode
        run: |
          options(crayon.enabled = TRUE)
          # Use pkgload + testthat directly rather than devtools (lighter).
          suppressMessages(pkgload::load_all("."))
          results <- testthat::test_local(reporter = testthat::SummaryReporter$new())
          all_results <- unlist(lapply(results, function(r) r$results),
                                recursive = FALSE)
          n_fail <- length(Filter(
            function(x) inherits(x, "expectation_failure") ||
                        inherits(x, "expectation_error"),
            all_results
          ))
          cat(sprintf("\nTotal expectations: %d, failures: %d\n",
                      length(all_results), n_fail))
          if (n_fail > 0L) {
            quit(status = 1)
          }
        shell: Rscript {0}

      - name: Run SPSS reference drift detector
        run: |
          Rscript tests/spss_reference/verify_inline.R

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strict-validation-results
          path: |
            tests/testthat/_snaps/
            *.Rcheck/
          if-no-files-found: ignore
          retention-days: 14
